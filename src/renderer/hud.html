<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Intento HUD</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .hud-container {
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 6px 12px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
            max-width: 95%;
            overflow: hidden;
        }

        .hud-container.resizing {
            transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), height 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .hud-text {
            color: white;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            70% {
                transform: scale(0.95);
            }

            100% {
                transform: scale(1);
            }
        }

        .pulse {
            animation: pulse 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .lucide {
            width: 14px;
            height: 14px;
            stroke-width: 2.5px;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div class="hud-container">
        <span class="hud-text" id="hudText"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" class="lucide lucide-wand-2">
                <path
                    d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z" />
                <path d="m14 7 3 3" />
                <path d="M5 6v4" />
                <path d="M19 14v4" />
                <path d="M10 2v2" />
                <path d="M7 8H3" />
                <path d="M21 16h-4" />
                <path d="M11 3H9" />
            </svg></span>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        const hudText = document.getElementById('hudText');
        const container = document.querySelector('.hud-container');

        const SCOUT_ICON = `<div class="spinner"></div>`;

        ipcRenderer.on('hud:update', (_event, text) => {
            // 1. Lock current dimensions
            const startWidth = container.offsetWidth;
            const startHeight = container.offsetHeight;

            // Apply fixed size to prevent jump
            container.style.width = `${startWidth}px`;
            container.style.height = `${startHeight}px`;

            // 2. Change content
            hudText.innerHTML = text;

            // 3. Measure & Animate
            requestAnimationFrame(() => {
                // Temporarily unlock to measure new natural size
                container.style.width = 'auto';
                container.style.height = 'auto';

                const targetWidth = container.offsetWidth;
                const targetHeight = container.offsetHeight;

                // Re-lock to start dimensions
                container.style.width = `${startWidth}px`;
                container.style.height = `${startHeight}px`;

                // Force layout reflow
                void container.offsetWidth;

                // Add transition class and set final dimensions
                container.classList.add('resizing');
                container.style.width = `${targetWidth}px`;
                container.style.height = `${targetHeight}px`;
            });
        });

        // Clean up after transition
        container.addEventListener('transitionend', (e) => {
            if (e.propertyName === 'width') {
                container.classList.remove('resizing');
                container.style.width = 'auto';
                container.style.height = 'auto';
            }
        });
    </script>
</body>

</html>
